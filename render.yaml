services:
  - type: web
    name: zerominute-analyzer
    env: python
    plan: free
    rootDir: .
    buildCommand: pip install -r services/analyzer/requirements.txt
    startCommand: uvicorn services.analyzer.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ETHERSCAN_API_KEY
        sync: false
